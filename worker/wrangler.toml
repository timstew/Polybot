name = "polybot-copy-listener"
main = "src/index.ts"
compatibility_date = "2025-12-01"

[[d1_databases]]
binding = "DB"
database_name = "polybot"
database_id = "1a14301f-5bbd-4be9-a530-56322028ee13"

# FIREHOSE_DB: not yet provisioned — falls back to DB in code
# [[d1_databases]]
# binding = "FIREHOSE_DB"
# database_name = "polybot-firehose"
# database_id = "2fbb7e24-7924-4563-8726-e2d8e0d94b2e"

[durable_objects]
bindings = [
  { name = "LISTENER", class_name = "CopyListenerDO" },
  { name = "FIREHOSE", class_name = "FirehoseDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["CopyListenerDO"]

[[migrations]]
tag = "v2"
new_classes = ["FirehoseDO"]

# Python API (Cloud Run) — set after deploying Cloud Run
[vars]
PYTHON_API_URL = "https://polybot-api-182262919086.europe-west4.run.app"

# Auto-start: runs every minute to ensure the listener is alive
[triggers]
crons = ["* * * * *"]
